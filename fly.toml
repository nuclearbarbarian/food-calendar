app = "parkes-food"
primary_region = "ord"

[build]

[env]
  DB_PATH = "/data/food.db"
  DIGEST_TZ = "America/Chicago"

[[mounts]]
  source = "food_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
